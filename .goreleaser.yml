version: 2

project_name: vlogxy

git:
  tag_sort: -version:creatordate

builds:
  - id: amd64
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -w=false
      - -s=false
    flags:
      - -trimpath
    main: ./cmd/vlogxy/main.go
    binary: bin/vlogxy
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - netgo
    builder: go

  - id: arm64
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -w=false
      - -s=false
    flags:
      - -trimpath
    main: ./cmd/vlogxy/main.go
    binary: bin/vlogxy
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - netgo
    builder: go

changelog:
  use: github
  format: "{{ .SHA }}: {{ .Message }}{{ with .AuthorUsername }} by @{{ . }}{{ end }}"
  filters:
    exclude:
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: "🚀 New Features 🚀"
      regexp: '^.*?(feat|enh|enhancement)(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "🐛 Notable Fixes 🐛"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: "✨ More Improvements ✨"
      order: 9999
  disable: >-
    {{ if eq (index .Env "SKIP_SCM_RELEASE") "true" }}{{true}}{{ else }}{{false}}{{ end }}

dockers:
  - id: linux-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Env.VERSION }}-amd64"
      - "{{ .Env.IMAGE_REPO }}:latest-amd64"
    skip_push: false
    dockerfile: "./goreleaser.dockerfile"
    use: buildx
    ids:
      - amd64
    build_flag_templates:
      - --label=org.opencontainers.image.title="{{ .ProjectName }} - vlogxy"
      - --label=org.opencontainers.image.description="Image with vlogxy"
      - --label=org.opencontainers.image.url=https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}
      - --label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}
      - --label=org.opencontainers.image.version={{ .Env.VERSION }}
      - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=Apache-2.0
      - --platform=linux/amd64

  - id: linux-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Env.VERSION }}-arm64"
      - "{{ .Env.IMAGE_REPO }}:latest-arm64"
    skip_push: false
    dockerfile: "./goreleaser.dockerfile"
    use: buildx
    ids:
      - arm64
    build_flag_templates:
      - --label=org.opencontainers.image.title="{{ .ProjectName }} - vlogxy"
      - --label=org.opencontainers.image.description="Image with vlogxy"
      - --label=org.opencontainers.image.url=https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}
      - --label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}
      - --label=org.opencontainers.image.version={{ .Env.VERSION }}
      - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=Apache-2.0
      - --platform=linux/arm64/v8

docker_manifests:
  - name_template: "{{ .Env.IMAGE_REPO }}:{{ .Env.VERSION }}"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Env.VERSION }}-amd64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Env.VERSION }}-arm64"
    skip_push: false
    use: docker

  - name_template: "{{ .Env.IMAGE_REPO }}:latest"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:latest-amd64"
      - "{{ .Env.IMAGE_REPO }}:latest-arm64"
    skip_push: false
    use: docker

release:
  github:
    owner: "{{ .Env.GITHUB_OWNER }}"
    name: "{{ .Env.GITHUB_REPO_NAME }}"
  draft: true
  replace_existing_draft: true
  replace_existing_artifacts: true
  prerelease: auto
  mode: replace
  footer: |
    ---
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}/compare/{{ .PreviousTag }}...{{ .Tag }}
  disable: >-
    {{ if eq (index .Env "SKIP_SCM_RELEASE") "true" }}{{true}}{{ else }}{{false}}{{ end }}
